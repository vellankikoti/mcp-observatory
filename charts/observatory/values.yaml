image:
  repository: ghcr.io/vellankikoti/mcp-observatory
  tag: "v1.0.0"
  pullPolicy: IfNotPresent
  imagePullSecrets: []

httpServer:
  enabled: true
  port: 8000

prometheus:
  url: "http://prometheus.monitoring.svc.cluster.local:9090"

llm:
  offline: true
  provider: ""
  baseUrl: ""
  secretName: ""
  secretKey: "api-key"

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi

serviceAccount:
  create: true
  annotations: {}

rbac:
  create: true

nameOverride: ""
fullnameOverride: ""

[project]
name = "mcp-observatory"
version = "1.0.0"
description = "MCP query router for observability of distributed MCP server fleets."
readme = "../../README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "vellankikoti", email = "vellankikoti@gmail.com" }]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Topic :: System :: Systems Administration",
]
dependencies = [
  "pydantic>=2.7",
  "httpx>=0.27",
  "typer>=0.12",
  "fastmcp>=3.0",
  "litellm>=1.40",
  "instructor>=1.3",
  "opentelemetry-api>=1.25",
  "rich>=13.7",
  # mcp-observatory-sdk added as a runtime dep in Plan 5 (v0.5.0) when the server instruments its own tool calls
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "pytest-httpx>=0.30",
  "ruff>=0.4",
  "mypy>=1.10",
  "PyYAML>=6.0",
  "types-PyYAML",
]

[project.scripts]
observatory = "observatory.cli:app"
mcp-observatory = "observatory.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/observatory"]

name: "mcp-observatory-server"
description: "Run observatory-server CLI to query MCP server fleet metrics from Prometheus."
branding:
  icon: activity
  color: green
inputs:
  prom-url:
    description: "Prometheus base URL."
    required: false
    default: "http://localhost:9090"
  command:
    description: "Subcommand to run: list-mcp-servers | get-tool-call-rate."
    required: true
  args:
    description: "Space-separated arguments to the subcommand."
    required: false
    default: ""
  format:
    description: "Output format: json | md."
    required: false
    default: "json"
  offline:
    description: "Set true to skip LLM-using tools."
    required: false
    default: "true"
  image:
    description: "Override the action's container image."
    required: false
    default: "ghcr.io/vellankikoti/mcp-observatory-server:v0.1.0"
outputs:
  report-path:
    description: "Path to the produced report file."
    value: ${{ steps.run.outputs.report-path }}
runs:
  using: composite
  steps:
    - id: run
      shell: bash
      env:
        INPUT_PROM_URL: ${{ inputs.prom-url }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_FORMAT: ${{ inputs.format }}
        INPUT_OFFLINE: ${{ inputs.offline }}
        IMAGE: ${{ inputs.image }}
      run: |
        set -euo pipefail
        report="${RUNNER_TEMP:-/tmp}/observatory-report.${INPUT_FORMAT}"
        docker_args=(run --rm --network=host -v "${PWD}:/workspace" -w /workspace)
        if [[ "${INPUT_OFFLINE}" == "true" ]]; then
          docker_args+=(-e "OBSERVATORY_SERVER_OFFLINE=1")
        fi
        if [[ -n "${INPUT_PROM_URL:-}" ]]; then
          docker_args+=(-e "OBSERVATORY_SERVER_PROM_URL=${INPUT_PROM_URL}")
        fi
        set +e
        # shellcheck disable=SC2206
        cmd_args=(${INPUT_COMMAND} ${INPUT_ARGS} "--format=${INPUT_FORMAT}" "--prom-url=${INPUT_PROM_URL}")
        docker "${docker_args[@]}" "${IMAGE}" "${cmd_args[@]}" | tee "${report}"
        code=${PIPESTATUS[0]}
        set -e
        echo "report-path=${report}" >> "${GITHUB_OUTPUT}"
        exit "${code}"

name: release
on:
  push:
    tags: ["v*"]
permissions:
  contents: write
  id-token: write
  packages: write
jobs:
  pypi-sdk:
    runs-on: ubuntu-latest
    environment: pypi-sdk
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv venv
      - run: uv pip install build
      - name: Build sdk
        run: uv run python -m build packages/sdk --outdir dist-sdk
      - name: Publish sdk
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist-sdk }

  pypi-server:
    runs-on: ubuntu-latest
    environment: pypi-server
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - run: uv venv
      - run: uv pip install build
      - name: Build server
        run: uv run python -m build packages/server --outdir dist-server
      - name: Publish server
        uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist-server }
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mcp-observatory-server:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/mcp-observatory-server:latest
          sbom: true
          provenance: true
      - uses: sigstore/cosign-installer@v3.5.0
        with: { cosign-release: v2.2.4 }
      - name: Sign image
        env:
          COSIGN_EXPERIMENTAL: "1"
          DIGEST: ${{ steps.build.outputs.digest }}
          OWNER: ${{ github.repository_owner }}
        run: cosign sign --yes "ghcr.io/${OWNER}/mcp-observatory-server@${DIGEST}"
      - id: sbom
        uses: anchore/sbom-action@v0
        with:
          image: "ghcr.io/${{ github.repository_owner }}/mcp-observatory-server:${{ github.ref_name }}"
          format: cyclonedx-json
          artifact-name: sbom-${{ github.ref_name }}.cdx.json
      - name: Attach SBOM
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ steps.sbom.outputs.SBOM_ARTIFACT_PATH }}
